name: Flash Info Runner

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-flash-info:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Synthesis Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          MEDIASTACK_API_KEY: ${{ secrets.MEDIASTACK_API_KEY }}
        run: python flash_info.py full

      - name: Generate Sovereign Dashboard
        run: python dashboard_generator.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/flash_info_output.csv docs/index.html
          git diff-index --quiet HEAD || git commit -m "System Sync: V21 Sovereign Update"
          git push